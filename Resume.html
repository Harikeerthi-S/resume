<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modern Resume Builder</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <span class="navbar-brand">Modern Resume Builder</span>
  </div>
</nav>

<div class="container my-4">

<!-- Form Card -->
<div class="card shadow-sm mb-4">
<div class="card-body">

<form id="resumeForm" novalidate>

<h4>Personal Information</h4>
<div class="row g-3">
  <div class="col-md-4 text-center">
    <img id="photoPreview" src="" class="rounded-circle mb-2 d-none" width="120" alt="Profile Photo">
    <input type="file" id="photoInput" class="form-control" accept="image/*" onchange="loadPhoto(event)">
  </div>
  <div class="col-md-8">
    <input type="text" id="fullName" class="form-control mb-2" placeholder="Full Name *" required>
    <input type="text" id="role" class="form-control mb-2" placeholder="Role / Title">
    <input type="tel" id="phone" class="form-control mb-2" placeholder="Phone *" required>
    <input type="email" id="email" class="form-control mb-2" placeholder="Email *" required>
    <input type="text" id="location" class="form-control mb-2" placeholder="Location">
    <input type="url" id="linkedin" class="form-control mb-2" placeholder="LinkedIn URL">
    <input type="url" id="github" class="form-control mb-2" placeholder="GitHub / Portfolio URL">
  </div>

  <div class="col-12">
    <textarea id="summary" maxlength="500" rows="3" class="form-control"
      placeholder="Profile Summary *" required></textarea>
    <div class="d-flex justify-content-between">
      <div class="invalid-feedback">Required</div>
      <small id="charCount">0/500</small>
    </div>
  </div>
</div>

<hr>
<h5>Skills</h5>
<div class="input-group mb-2">
  <input type="text" id="skillInput" class="form-control" placeholder="Enter Skill">
  <button type="button" class="btn btn-primary" onclick="addSkill()">Add</button>
</div>
<div id="skillsContainer"></div>

<hr>
<h5>Experience</h5>
<div id="experienceContainer"></div>
<button type="button" class="btn btn-outline-primary mt-2" onclick="addExperience()">Add Experience</button>

<hr>
<h5>Education</h5>
<div id="educationContainer"></div>
<button type="button" class="btn btn-outline-primary mt-2" onclick="addEducation()">Add Education</button>

<hr>
<h5>Projects</h5>
<div id="projectContainer"></div>
<button type="button" class="btn btn-outline-primary mt-2" onclick="addProject()">Add Project</button>

<hr>
<h5>Certifications</h5>
<div id="certContainer"></div>
<button type="button" class="btn btn-outline-primary mt-2" onclick="addCertification()">Add Certification</button>

<hr>
<div class="d-flex gap-2 flex-wrap">
<button type="button" class="btn btn-success" onclick="generateResume()">Generate Resume</button>
<button type="reset" class="btn btn-secondary" onclick="clearForm()">Clear</button>
<button type="button" class="btn btn-danger" onclick="window.print()">Download PDF</button>
</div>

</form>
</div>
</div>

<!-- Resume Preview -->
<div class="card shadow-sm">
<div class="card-body" id="resumePreview">
<h3 class="text-center text-muted">Resume Preview</h3>
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
